<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===============================
   ROOT COLORS (Your Theme)
================================= */
:root {
  --careon-base: #006D77;
  --careon-black: #031B4E;
  --careon-primary: #BEE1E6;
  --careon-white: #ffffff;
}

/* ===============================
   BODY
================================= */
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--careon-base), var(--careon-black));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    overflow: hidden;
}

/* ===============================
   MAIN CONTAINER
================================= */
.error-wrapper {
    text-align: center;
    max-width: 700px;
    padding: 40px 20px;
    animation: fadeIn 1s ease;
}

/* Animated 404 Number */
.error-code {
    font-size: 150px;
    font-weight: 800;
    margin: 0;
    position: relative;
    color: rgba(255,255,255,0.1);
}

.error-code span {
    color: #fff;
    position: relative;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
}

/* Medical Icon */
.error-icon {
    font-size: 60px;
    margin: 20px 0;
    color: var(--careon-primary);
    animation: pulse 1.5s infinite;
}

/* Message */
.error-message {
    font-size: 24px;
    margin-bottom: 15px;
}

.error-subtext {
    opacity: 0.8;
    margin-bottom: 30px;
}

/* Button */
.error-btn {
    display: inline-block;
    padding: 14px 35px;
    background: var(--careon-white);
    color: var(--careon-black);
    border-radius: 40px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s ease;
}

.error-btn:hover {
    background: var(--careon-primary);
    transform: translateY(-3px);
}

/* ===============================
   ANIMATIONS
================================= */
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===============================
   RESPONSIVE
================================= */
@media (max-width: 768px) {
    .error-code {
        font-size: 100px;
    }
    .error-message {
        font-size: 20px;
    }
}

@media (max-width: 480px) {
    .error-code {
        font-size: 80px;
    }
}

</style>
</head>
<body>

<div class="error-wrapper">

    <h1 class="error-code">
        <span>4</span>0<span>4</span>
    </h1>

    <div class="error-icon">
        <i class="fas fa-laptop-medical"></i>
    </div>

    <div class="error-message">
        Medical Resource Not Found
    </div>

    <div class="error-subtext">
        The page you are looking for might have been removed,
        had its name changed, or is temporarily unavailable.
    </div>

    <a href="index.html" class="error-btn">
        Back to Homepage
    </a>

</div>

</body>
</html>
